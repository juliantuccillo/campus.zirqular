<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termodinámica de la Sostenibilidad</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background-color: #0f172a; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Adaptación de los iconos para versión CDN
        const Icon = ({ name, color, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{color: color}}></i>;
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            const slides = [
                {
                    title: "1. El punto de partida: La Entropía",
                    subtitle: "Sin energía, todo tiende al desorden",
                    content: "La física nos dice que las estructuras complejas tienden a degradarse. Mantener el orden requiere un flujo constante de energía.",
                    icon: "activity",
                    iconColor: "#94a3b8",
                    color: "bg-slate-900",
                    visual: (
                        <svg viewBox="0 0 400 200" className="w-full h-64">
                            {[...Array(20)].map((_, i) => (
                                <circle key={i} cx={20 + Math.random() * 360} cy={20 + Math.random() * 160} r="3" fill="#94a3b8">
                                    <animate attributeName="cx" values={`${20+Math.random()*360};${20+Math.random()*360};${20+Math.random()*360}`} dur={`${3+Math.random()*2}s`} repeatCount="indefinite" />
                                    <animate attributeName="cy" values={`${20+Math.random()*160};${20+Math.random()*160};${20+Math.random()*160}`} dur={`${3+Math.random()*2}s`} repeatCount="indefinite" />
                                </circle>
                            ))}
                            <text x="200" y="180" textAnchor="middle" fill="#94a3b8" style={{fontSize: '12px', fontFamily: 'monospace'}}>ESTADO DE ALTA ENTROPÍA (DESORDEN)</text>
                        </svg>
                    )
                },
                {
                    title: "2. La Vida: Organización de Carbono",
                    subtitle: "Negentropía impulsada por el Sol",
                    content: "La vida captura energía solar para 'ordenar' el carbono disperso (CO₂) y convertirlo en estructuras complejas (biomasa).",
                    icon: "sun",
                    iconColor: "#facc15",
                    color: "bg-emerald-900",
                    visual: (
                        <svg viewBox="0 0 400 200" className="w-full h-64">
                            <circle cx="200" cy="-50" r="80" fill="#facc15" opacity="0.3">
                                <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite" />
                            </circle>
                            <g>
                                <circle cx="50" cy="100" r="5" fill="#94a3b8">
                                    <animate attributeName="cx" values="50;180" dur="2s" repeatCount="indefinite" />
                                    <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite" />
                                </circle>
                                <text x="30" y="90" fill="#94a3b8" style={{fontSize: '10px'}}>CO₂ (Disperso)</text>
                            </g>
                            <rect x="195" y="150" width="10" height="50" fill="#3f6212" />
                            <path d="M200 150 Q230 120 250 130" stroke="#4ade80" strokeWidth="4" fill="none" />
                            <path d="M200 170 Q170 140 150 150" stroke="#4ade80" strokeWidth="4" fill="none" />
                            <text x="280" y="140" fill="#4ade80" style={{fontSize: '10px'}}>Biomasa (Orden)</text>
                        </svg>
                    )
                },
                {
                    title: "3. La Gran Ruptura: Combustión",
                    subtitle: "Dispersión acelerada de estructuras",
                    content: "En dos siglos, liberamos el carbono que la Tierra tardó millones de años en organizar. La velocidad es la clave.",
                    icon: "flame",
                    iconColor: "#f97316",
                    color: "bg-orange-950",
                    visual: (
                        <svg viewBox="0 0 400 200" className="w-full h-64">
                            <rect x="50" y="150" width="300" height="10" fill="#171717" />
                            <text x="200" y="180" fill="#737373" style={{fontSize: '10px'}}>RESERVORIO FÓSIL (MILLONES DE AÑOS)</text>
                            <g>
                                {[...Array(5)].map((_, i) => (
                                    <circle key={i} cx={150 + i*25} cy="140" r="10" fill="#404040">
                                        <animate attributeName="cy" values="140;20" dur="1s" begin={`${i*0.2}s`} repeatCount="indefinite" />
                                        <animate attributeName="opacity" values="1;0" dur="1s" begin={`${i*0.2}s`} repeatCount="indefinite" />
                                        <animate attributeName="r" values="10;25" dur="1s" begin={`${i*0.2}s`} repeatCount="indefinite" />
                                    </circle>
                                ))}
                            </g>
                            <text x="280" y="50" fill="#f97316" style={{fontWeight: 'bold'}}>VELOCIDAD ↑↑↑</text>
                        </svg>
                    )
                },
                {
                    title: "4. La Ecuación del Balance",
                    subtitle: "Un problema de flujos, no de voluntad",
                    content: "Dispersamos 11 GtC/año, pero el planeta solo puede reorganizar 6-7 GtC/año. El excedente se acumula en la atmósfera.",
                    icon: "zap",
                    iconColor: "#60a5fa",
                    color: "bg-slate-800",
                    visual: (
                        <div className="flex flex-col items-center justify-center h-64 text-white space-y-4">
                            <div className="bg-red-500/20 p-4 rounded-lg border border-red-500 w-full text-center font-mono">
                                R_disp (Dispersión) ≈ 11 GtC/año
                            </div>
                            <div className="text-3xl font-bold">≠</div>
                            <div className="bg-emerald-500/20 p-4 rounded-lg border border-emerald-500 w-full text-center font-mono">
                                R_reorg (Reorganización) ≈ 7 GtC/año
                            </div>
                            <div className="text-orange-400 pt-4 font-mono">Excedente: +4.5 GtC/año → CO₂ ↑</div>
                        </div>
                    )
                },
                {
                    title: "5. Sostenibilidad: El Alineamiento",
                    subtitle: "Ajustar las tasas a los flujos solares",
                    content: "Ser sostenible es lograr que R_disp ≤ R_reorg. No es dejar de usar energía, es usar el flujo que llega hoy.",
                    icon: "scale",
                    iconColor: "#22d3ee",
                    color: "bg-cyan-950",
                    visual: (
                        <svg viewBox="0 0 400 200" className="w-full h-64">
                            <line x1="100" y1="150" x2="300" y2="150" stroke="white" strokeWidth="4" />
                            <circle cx="200" cy="150" r="5" fill="white" />
                            <g>
                                <animateTransform attributeName="transform" type="rotate" values="-2;2;-2" dur="4s" repeatCount="indefinite" additive="sum" pivot="200 150" />
                                <rect x="100" y="100" width="60" height="10" fill="#f87171" rx="2" />
                                <text x="130" y="90" textAnchor="middle" fill="#f87171" style={{fontSize: '10px'}}>Dispersión</text>
                                <rect x="240" y="100" width="60" height="10" fill="#34d399" rx="2" />
                                <text x="270" y="90" textAnchor="middle" fill="#34d399" style={{fontSize: '10px'}}>Reorganización</text>
                            </g>
                        </svg>
                    )
                },
                {
                    title: "6. La Solución: Vivir del Ingreso",
                    subtitle: "Dejar el capital fósil, usar el flujo solar",
                    content: "La transición energética es física pura: alinear nuestra economía con los tiempos de reorganización del sistema Tierra.",
                    icon: "tree-deciduous",
                    iconColor: "#4ade80",
                    color: "bg-green-950",
                    visual: (
                        <div className="flex flex-col items-center justify-center h-64 text-center space-y-4 px-6">
                            <div className="text-green-400 text-lg font-bold italic">
                                "No vivir del capital acumulado durante millones de años, sino del ingreso que llega cada día."
                            </div>
                            <div className="flex space-x-4">
                                <Icon name="sun" color="#facc15" className="w-8 h-8" />
                                <Icon name="wind" color="#60a5fa" className="w-8 h-8" />
                                <Icon name="leaf" color="#4ade80" className="w-8 h-8" />
                            </div>
                            <button 
                                onClick={() => setCurrentSlide(0)}
                                className="mt-4 px-6 py-2 bg-green-600 text-white rounded-full hover:bg-green-500 transition-colors text-sm"
                            >
                                Reiniciar Análisis
                            </button>
                        </div>
                    )
                }
            ];

            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slides.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);

            return (
                <div className={`min-h-screen ${slides[currentSlide].color} transition-colors duration-1000 flex flex-col items-center justify-center p-4 font-sans text-white overflow-hidden`}>
                    <div className="max-w-xl w-full bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl overflow-hidden">
                        <div className="p-8 pb-4">
                            <div className="flex items-center justify-between mb-6">
                                <span className="text-xs font-mono uppercase tracking-widest text-white/50">Análisis Termodinámico</span>
                                <div className="flex gap-1">
                                    {slides.map((_, i) => (
                                        <div key={i} className={`h-1 w-4 rounded-full transition-all ${i === currentSlide ? 'bg-white w-8' : 'bg-white/20'}`} />
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4 mb-4">
                                <div className="p-3 bg-white/10 rounded-2xl">
                                    <Icon name={slides[currentSlide].icon} color={slides[currentSlide].iconColor} className="w-10 h-10" />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold leading-tight">{slides[currentSlide].title}</h1>
                                    <h2 className="text-sm md:text-base text-white/70 font-medium">{slides[currentSlide].subtitle}</h2>
                                </div>
                            </div>
                        </div>

                        <div className="px-8 py-4">
                            <div className="bg-black/20 rounded-2xl overflow-hidden mb-6 border border-white/5">
                                {slides[currentSlide].visual}
                            </div>
                            <p className="text-sm md:text-base leading-relaxed text-white/80 min-h-[4.5rem]">
                                {slides[currentSlide].content}
                            </p>
                        </div>

                        <div className="p-8 pt-4 flex justify-between items-center bg-black/20">
                            <button 
                                onClick={prevSlide}
                                className="flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-white/10 transition-colors text-sm disabled:opacity-30"
                                disabled={currentSlide === 0}
                            >
                                Anterior
                            </button>
                            <span className="text-xs font-mono text-white/40">{currentSlide + 1} / {slides.length}</span>
                            <button 
                                onClick={nextSlide}
                                className="flex items-center gap-2 px-6 py-2 bg-white text-black font-bold rounded-xl hover:bg-white/90 transition-colors text-sm"
                            >
                                {currentSlide === slides.length - 1 ? "Finalizar" : "Siguiente"}
                            </button>
                        </div>
                    </div>
                    <p className="mt-8 text-xs text-white/30 text-center max-w-md">
                        Basado en la tesis "Carbono, vida y entropía".<br/>
                        Referencias: Kleidon (2010), Schrödinger (1944).
                    </p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
